name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test-python:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: uv run --extra dev pytest tests/unit -q

  build-macos:
    name: macOS app — test + build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: Mac-App
        run: xcodegen generate

      - name: Run Swift tests
        working-directory: Mac-App
        run: |
          xcodebuild test \
            -project FeishuBridge.xcodeproj \
            -scheme FeishuBridge \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO

      - name: Build Release app
        working-directory: Mac-App
        run: |
          xcodebuild \
            -project FeishuBridge.xcodeproj \
            -scheme FeishuBridge \
            -configuration Release \
            -derivedDataPath build/dd \
            build \
            CONFIGURATION_BUILD_DIR="$PWD/build/Release"
          # ditto preserves the bundle structure and ad-hoc signature in the zip.
          ditto -c -k --keepParent \
            "build/Release/Feishu Bridge.app" \
            "FeishuBridge-macOS.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: Mac-App/FeishuBridge-macOS.zip
          if-no-files-found: error

  publish:
    name: Publish to PyPI + GitHub Release
    needs: [test-python, build-macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)
      contents: write  # Required for creating GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release notes can diff tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Download macOS app artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: dist-macos  # separate dir so it is NOT uploaded to PyPI

      - name: Extract annotated tag message
        id: tag_msg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo 'body<<EOF'
            git tag -l --format='%(contents)' "$TAG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_msg.outputs.body }}
          generate_release_notes: true  # auto-append PR/commit diff
          fail_on_unmatched_files: false
          files: dist-macos/FeishuBridge-macOS.zip
